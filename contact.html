<body data-page="contact">
  <header class="site-header" data-section="header">
    <div class="container">
      <a class="brand" href="./index.html" data-component="link" data-id="brand-home">Drive<span>Away</span></a>
      <nav class="nav" aria-label="Primary">
        <a href="./cars.html" data-component="link" data-id="nav-cars">Cars</a>
        <a href="./about.html" data-component="link" data-id="nav-about">About</a>
        <a href="./contact.html" data-component="link" data-id="nav-contact">Contact</a>
      </nav>
    </div>
  </header>

  <main class="container section" data-section="contact">
    <p class="crumbs"><a href="./index.html">Home</a> &rsaquo; Contact</p>
    <h1 style="text-align:center;">Get in touch</h1>
    <p class="lede">Have a question about our demo or fleet? Send us a note. (This form is for demo purposes only.)</p>

    <form id="contact-form" class="contact-form" novalidate
      data-component="form" data-id="contact-form"
      data-fs-element="Contact Form">
      <div class="field-row">
        <!-- Name fields: mask (PII). -->
        <div class="field fs-mask">
          <label for="contact-name">Your name</label>
          <input id="contact-name" name="name" type="text" required
            data-component="input" data-id="contact-name" />
        </div>
        <!-- Email: mask (PII). -->
        <div class="field fs-mask">
          <label for="contact-email">Email</label>
          <input id="contact-email" name="email" type="email" required
            data-component="input" data-id="contact-email" />
        </div>
      </div>
      <div class="field">
        <label for="contact-topic">Topic</label>
        <select id="contact-topic" name="topic"
          data-component="select" data-id="contact-topic">
          <option>General question</option>
          <option>Booking help</option>
          <option>Press &amp; partnerships</option>
          <option>Other</option>
        </select>
      </div>
      <div class="field">
        <label for="contact-message">Message</label>
        <textarea id="contact-message" name="message" rows="5" required
          data-component="textarea" data-id="contact-message"></textarea>
      </div>
      <div id="contact-status" class="muted" role="status" aria-live="polite"></div>
      <button type="submit" class="btn btn-primary btn-block"
        data-component="button" data-id="contact-submit">Send message</button>
    </form>
  </main>

  <footer class="site-footer" data-section="footer">
    <div class="container">
      <div><div class="brand" style="color:#fff;">Drive<span>Away</span></div><p class="muted">A demo car rental site.</p></div>
      <div><h4>Company</h4><p><a href="./about.html">About</a></p><p><a href="./contact.html">Contact</a></p></div>
      <div><h4>Browse</h4><p><a href="./cars.html">All cars</a></p></div>
    </div>
    <div class="legal">© <span id="year"></span> DriveAway Demo. All rights reserved.</div>
  </footer>

  <script type="module" src="./assets/js/main.js"></script>
  <script type="module" src="./assets/js/contact.js"></script>
</body>
</html>
